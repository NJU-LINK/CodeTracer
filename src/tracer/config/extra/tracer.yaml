tracer:
  task_prompt: |
    You are running as a terminal agent inside a tool called tracer.

    Your job is to analyze a previously produced agent run output directory on disk.

    You MUST use shell commands to explore the directory and locate the trajectory artifact(s) that record the agent's steps.

    You MUST decide how to segment the run into steps and, for each step you label, you MUST map it back to the original trajectory file location using:
    - trajectory relative path (relative to the run directory)
    - line_start and line_end (1-indexed)

    You MUST output only steps labeled incorrect or unuseful. Do not output ok steps.

    You MUST ensure every output record includes a non-empty command string.

    Required output files (write them into the run directory):

    1) mini_tracer_labels.jsonl

    Each line must be a JSON object with:
    - command_index: integer (1..N)
    - command: string (the command for that step)
    - trajectory_path: string (relative path)
    - line_start: integer
    - line_end: integer
    - label: "incorrect" or "unuseful"
    - error_label: short string tag (snake_case preferred)

    2) mini_tracer_summary.json

    JSON object with:
    - incorrect_count: integer
    - unuseful_count: integer
    - by_error_label: object mapping error_label -> count

    Execution rule:
    When you are done and the two files exist in the run directory, finish by running:
    echo MINI_SWE_AGENT_FINAL_OUTPUT

agent:
  system_template: |
    You are a helpful assistant that can interact with a computer.

    Your response must contain exactly ONE bash code block with ONE command (or commands connected with && or ||).
    Include a THOUGHT section before your command where you explain your reasoning process.
    Format your response as shown in <format_example>.

    <format_example>
    Your reasoning and analysis here. Explain why you want to perform the action.

    ```bash
    your_command_here
    ```
    </format_example>

    Failure to follow these rules will cause your response to be rejected.
  instance_template: |
    {{task}}
  action_observation_template: |
    <returncode>{{output.returncode}}</returncode>
    {% if output.output | length < 10000 -%}
    <output>
    {{ output.output -}}
    </output>
    {%- else -%}
    <warning>
    The output of your last command was too long.
    Please try a different command that produces less output.
    If you're looking at a file you can try use head, tail or sed to view a smaller number of lines selectively.
    If you're using grep or find and it produced too much output, you can use a more selective search pattern.
    If you really need to see something from the full command's output, you can redirect output to a file and then search in that file.
    </warning>
    {%- set elided_chars = output.output | length - 10000 -%}
    <output_head>
    {{ output.output[:5000] }}
    </output_head>
    <elided_chars>
    {{ elided_chars }} characters elided
    </elided_chars>
    <output_tail>
    {{ output.output[-5000:] }}
    </output_tail>
    {%- endif -%}
  format_error_template: |
    Please always provide EXACTLY ONE action in triple backticks, found {{actions|length}} actions.
    If you want to end the task, please issue the following command: `echo MINI_SWE_AGENT_FINAL_OUTPUT`
    without any other command.
    Else, please format your response exactly as follows:

    <response_example>
    Here are some thoughts about why you want to perform the action.

    ```bash
    <action>
    ```
    </response_example>
  timeout_template: |
    The last command <command>{{action['action']}}</command> timed out and has been killed.
    The output of the command was:
    {% if output | length < 10000 -%}
    <output>
    {{output}}
    </output>
    {%- else -%}
    <warning>Output was too long and has been truncated.</warning>
    <output_head>
    {{ output[:5000] }}
    </output_head>
    <elided_chars>{{ output | length - 10000 }} characters elided</elided_chars>
    <output_tail>
    {{ output[-5000:] }}
    </output_tail>
    {%- endif %}
    Please try another command and make sure to avoid those requiring interactive input.
  step_limit: 0
  cost_limit: 3.0
  mode: confirm

environment:
  env:
    PAGER: cat
    MANPAGER: cat
    LESS: -R
    PIP_PROGRESS_BAR: "off"
    TQDM_DISABLE: "1"

model:
  api_base: ""
  api_key: ""
  model_name: ""
  model_kwargs: {}


