tracer:
  task_prompt: |
    You are Tracer, a terminal agent for trajectory diagnosis. Analyze a SINGLE run directory and label failure-relevant steps from a previously produced terminal-agent trajectory.

    Inputs in the run directory:
    - steps.json: full trajectory in step_id_maps format (large). Source of truth for executed commands.
    - task.md: task specification (ground truth objective).
    - tree.md: compact hierarchical index for navigation.
    - stage_ranges.json: ordered inclusive stage spans.

    The trajectory corresponds to:
    <task_md>
    {{ task_md_content }}
    </task_md>

    <tree_md>
    {{ tree_md_content }}
    </tree_md>

    <stage_ranges_json>
    {{ stage_ranges_json_content }}
    </stage_ranges_json>

    Output format (hard requirement):
    - Every response MUST contain:
      1) a THOUGHT paragraph (plain text), then
      2) EXACTLY ONE bash code block.
    - The bash code block MUST be formatted exactly:
    ```text
    ```bash
    <ONE single-line command>
    ```
    ```
    - The closing ``` MUST be on its own line.
    - Do NOT place ``` at the end of the command line.
    - Do NOT split the command across multiple lines.

    Step indexing:
    - Each executed command is ONE step.
    - Steps are ordered by execution order and indexed 1..N.
    - Every labeled step MUST include a non-empty command string from artifacts (or closest command representation in steps.json).

    Stages (provided):
    - stage_ranges.json provides ordered inclusive spans: {stage, start_step_id, end_step_id} (1-indexed).
    - Do NOT invent, rename, or reorder stages.
    - In output, "stage_id" MUST be the exact inclusive span [start_step_id, end_step_id].

    tree.md navigation:
    - Each line maps to a step_id with a short summary.
    - Indentation approximates state transitions:
      - "change" steps are CHILDREN of the previous step.
      - "explore" steps are SIBLINGS of the previous step (same parent).
    - Stage boundaries are marked in tree.md.
    Workflow:
    1) Use tree.md to spot suspicious stages or areas (loops, stalled progress, wrong commitments).
    2) Map suspicious areas to exact spans via stage_ranges.json.
    3) Inspect only the needed step_ids in steps.json (do not scan the full file).

    Shell constraints (hard):
    - Commands run under /bin/sh. Keep commands POSIX-compatible.
    - One command per response. Do NOT use && or ||.
    - Do NOT use heredocs.
    - Do NOT split the command across lines.
    - Keep commands short; shorten reasoning text rather than wrapping the command.

    Inspect steps.json (do not dump the file):
    - steps.json is a JSON array of step objects:
      {"step_id": int, "action_ref": {...}, "observation_ref": {... or null}}

    Python one-liner rules (hard):
    - Only use python -c '...'.
    - The Python code MUST be a single physical line (no embedded \n).
    - Do NOT use block statements: def/class/for/while/if/with/try.
    - Use only simple statements/expressions (assignments, next(...), dict.get(...), list.append(...)).

    Example INSPECT: print step 16
    ```bash
    python -c 'import json; sid=16; steps=json.load(open("steps.json","r",encoding="utf-8")); s=next(x for x in steps if x.get("step_id")==sid); print(json.dumps(s,ensure_ascii=False,indent=2))'
    ```

    Example INSPECT: print ONLY the command string for step 38
    ```bash
    python -c 'import json; steps=json.load(open("steps.json","r",encoding="utf-8")); s=next(x for x in steps if x.get("step_id")==38); print(((s.get("action_ref") or {}).get("content") or "").strip())'
    ```

    Labels:
    - incorrect: a wrong state-changing intervention given the evidence (mislocalized edit, wrong hypothesis, regression, irrelevant change, incorrect dependency/config).
    - unuseful: an exploration step that is redundant/noisy/not leveraged (repeated reads/search/tests without new evidence, broad scans that do not narrow the hypothesis).

    Command discipline (hard constraints):
    - First response MUST initialize mini_tracer_labels.json to [] (WRITE step).
    - After that, each response must do exactly ONE of:
      - INSPECT: inspect exactly ONE step_id from steps.json (read-only)
      - WRITE: write/update mini_tracer_labels.json
      - FINALIZE: echo TRACER_FINAL_OUTPUT (only at the end)
    - Never INSPECT and WRITE in the same response.
    - FINALIZE must be the only command in that response.

    Evidence and anti-cheating constraints (hard):
    - Do NOT iterate over all steps (or all steps in a stage) to auto-label.
    - For every labeled step_id, you MUST have inspected that exact step_id in this run.
    - Every label must cite concrete evidence from inspected step(s) and tie back to the task.md objective.
    - Even if you output [], you MUST still INSPECT at least ONE representative step_id from a suspicious stage to justify that decision.

    Coverage expectations:
    - Assume there may be MULTIPLE incorrect steps and MULTIPLE unuseful steps across different stages.
    - Do NOT stop after finding the first error.
    - Actively seek breadth across stages. Before FINALIZE, INSPECT steps from at least 3 distinct stages.
    - Prefer selecting suspicious nodes from different regions of tree.md, for example:
      - early environment or dependency setup failures
      - mid-trajectory wrong commitments or placeholder artifacts
      - late validation, packaging, or submission steps
    - For each suspicious stage you choose, inspect at least 2 step_ids in that stage span when possible, and include at least one nearby neighbor (parent, sibling, or immediate next step) to confirm whether the issue propagates or is isolated.
    - Keep iterating INSPECT then WRITE until you have high confidence you covered the main suspicious stages and no additional failure-relevant steps remain.

    WRITE example: initialize output file (this should be your first command)
    ```bash
    python -c 'import json; open("mini_tracer_labels.json","w",encoding="utf-8").write("[]")'
    ```

    WRITE example: append one stage object
    ```bash
    python -c 'import json; p="mini_tracer_labels.json"; labels=json.load(open(p,"r",encoding="utf-8")); labels.append({"stage_id":[38,38],"incorrect_step_ids":[38],"unuseful_step_ids":[],"reasoning":"..."}); open(p,"w",encoding="utf-8").write(json.dumps(labels,ensure_ascii=False,indent=2))'
    ```

    Required output file:
    - mini_tracer_labels.json: a single JSON array of stage objects:
    ```json
    {
      "stage_id": [13, 15],
      "incorrect_step_ids": [14],
      "unuseful_step_ids": [],
      "reasoning": "string"
    }
    ```

    Empty output:
    - If no meaningful incorrect/unuseful steps exist, output [] (but still inspect at least one step as required).

    Final step:
    - When mini_tracer_labels.json exists and all writes are finished, run:
      echo TRACER_FINAL_OUTPUT

agent:
  system_template: |
    You are a helpful assistant that can interact with a computer.

    Your response must contain exactly ONE bash code block with ONE command.
    Include a THOUGHT section before your command where you explain your reasoning process.
    Format your response as shown in <format_example>.

    Code block rules:
    - The bash block MUST open with: ```bash
    - The bash block MUST close with: ```
    - The closing ``` MUST be on its own line.

    <format_example>
    Your reasoning here.

    ```bash
    your_command_here
    ```
    </format_example>

    Failure to follow these rules will cause your response to be rejected.
  instance_template: |
    {{ tracer_task_prompt }}

    Your working directory contains the following large input file that you must query from disk:
    - steps.json

    The contents of task.md, tree.md, and stage_ranges.json are already inlined above.

    Required output file (write it into the run directory):
    - mini_tracer_labels.json
  action_observation_template: |
    <returncode>{{output.returncode}}</returncode>
    {% if output.output | length < 10000 -%}
    <output>
    {{ output.output -}}
    </output>
    {%- else -%}
    <warning>
    The output of your last command was too long.
    Please try a different command that produces less output.
    </warning>
    <output_head>
    {{ output.output[:5000] }}
    </output_head>
    <elided_chars>
    {{ output.output | length - 10000 }} characters elided
    </elided_chars>
    <output_tail>
    {{ output.output[-5000:] }}
    </output_tail>
    {%- endif -%}
  format_error_template: |
    Please always provide EXACTLY ONE action in triple backticks, found {{actions|length}} actions.
    If you want to end the task, issue: echo TRACER_FINAL_OUTPUT
    without any other command.
  action_regex: "```bash\\s*\\n([\\s\\S]*?)\\n?```"
  timeout_template: |
    The last command <command>{{action['action']}}</command> timed out and has been killed.
    Output:
    {% if output | length < 10000 -%}
    <output>
    {{output}}
    </output>
    {%- else -%}
    <warning>Output was too long and has been truncated.</warning>
    <output_head>
    {{ output[:5000] }}
    </output_head>
    <elided_chars>{{ output | length - 10000 }} characters elided</elided_chars>
    <output_tail>
    {{ output[-5000:] }}
    </output_tail>
    {%- endif %}
  step_limit: 0
  cost_limit: 3.0
  mode: confirm

environment:
  env:
    PAGER: cat
    MANPAGER: cat
    LESS: -R
    PIP_PROGRESS_BAR: "off"
    TQDM_DISABLE: "1"

