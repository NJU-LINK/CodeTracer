name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check src/

      - name: Verify package imports
        run: python -c "import codetracer; print(f'codetracer {codetracer.__version__} OK')"
